name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Deployment target label
        required: true
        default: production
        type: choice
        options:
          - production

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-portfolio-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build And Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy_target || 'production' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Hashed assets get a 1-year immutable cache.
      - name: Sync hashed assets (long cache)
        run: |
          aws s3 sync dist/ s3://${{ vars.AWS_S3_BUCKET }} \
            --delete \
            --exclude "*.html" \
            --exclude "vibe-machine/*" \
            --cache-control "public, max-age=31536000, immutable"

      # The vibe-machine snapshot has unhashed filenames; use a short cache.
      - name: Sync vibe-machine snapshot (short cache)
        run: |
          aws s3 sync dist/vibe-machine/ s3://${{ vars.AWS_S3_BUCKET }}/vibe-machine/ \
            --delete \
            --cache-control "public, max-age=300, must-revalidate"

      # HTML files must be re-fetched on every visit so deploys propagate.
      - name: Sync HTML (no cache)
        run: |
          aws s3 sync dist/ s3://${{ vars.AWS_S3_BUCKET }} \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
