name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-portfolio
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      # TODO: replace placeholders before first deploy
      S3_BUCKET: jeremybrachle-portfolio
      CLOUDFRONT_DISTRIBUTION_ID: REPLACE_ME
      DEPLOY_ROLE: arn:aws:iam::REPLACE_ACCOUNT_ID:role/github-actions-portfolio-deploy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      # Hashed assets get a 1-year immutable cache.
      - name: Sync hashed assets (long cache)
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }} \
            --delete \
            --exclude "*.html" \
            --exclude "vibe-machine/*" \
            --cache-control "public, max-age=31536000, immutable"

      # The vibe-machine snapshot has unhashed filenames; use a short cache.
      - name: Sync vibe-machine snapshot (short cache)
        run: |
          aws s3 sync dist/vibe-machine/ s3://${{ env.S3_BUCKET }}/vibe-machine/ \
            --delete \
            --cache-control "public, max-age=300, must-revalidate"

      # HTML files must be re-fetched on every visit so deploys propagate.
      - name: Sync HTML (no cache)
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }} \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
